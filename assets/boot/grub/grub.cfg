set timeout=10
set default=0

menuentry "Automated Debian install" {
    set background_color=black
    linux /install.amd/vmlinuz auto=true priority=critical preseed/file=/cdrom/preseed/preseed.cfg --- quiet
    initrd /install.amd/initrd.gz
}

menuentry "Rescue shell" {
    set background_color=black
    linux /install.amd/vmlinuz rescue/enable=true --- quiet
    initrd /install.amd/initrd.gz
}